<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --light-blue: #B3E5FC;
            --cyan: #00BCD4;
            --blue: #1976D2;
        }

        body {
            font-family: "Nunito", sans-serif;
            font-optical-sizing: auto;
            font-weight: 400;
            background: linear-gradient(135deg, var(--light-blue), var(--cyan), var(--blue));
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
        }

        .glass-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 80%;
            max-width: 600px;
            text-align: center;
        }

        h1 { font-weight: 700; color: #E0F7FA; }
        p { font-weight: 400; line-height: 1.6; }
        
        .btn-system {
            background: var(--cyan);
            color: #fff;
            padding: 15px 30px;
            border-radius: 12px;
            text-decoration: none;
            display: inline-block;
            font-weight: 600;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="glass-container">
        <h1>Juster Documentation</h1>
        <p>ApedoFile Security Engine & Documentation Portal</p>
        <a href="#" class="btn-system">Access System Logs</a>
    </div>
</body>
  </html>
  <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juster Documentation</title>
</head>
<body>

    <div id="menuIcon" onclick="toggleMenu()" style="cursor: pointer; font-size: 30px;">
        ☰
    </div>

    <div id="navLinks" style="display: none;">
        <a href="index.html">Home</a><br>
        <a href="documentation.html">Documentation</a><br>
        <a href="learn.html">Learn Juster</a>
    </div>

    <script>
        function toggleMenu() {
            const nav = document.getElementById('navLinks');
            const icon = document.getElementById('menuIcon');
            
            // Toggle visibility
            if (nav.style.display === "none") {
                nav.style.display = "block";
                icon.innerHTML = "✕";
            } else {
                nav.style.display = "none";
                icon.innerHTML = "☰";
            }
        }
    </script>
</body>
</html>
